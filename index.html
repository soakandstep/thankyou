<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Soak & Step – Thank You</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f0ea;
      --ink: #012428;
      --ink-soft: rgba(1,36,40,0.55);
      --ink-ghost: rgba(1,36,40,0.12);
      --card-bg: rgba(255,255,255,0.45);
      --glass-border: rgba(255,255,255,0.72);
      --glass-shadow: rgba(1,36,40,0.10);
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      font-family: 'Jost', sans-serif;
      color: var(--ink);
      overflow-x: hidden;
    }

    /* ── Animated mesh background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(1,36,40,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 60% 80% at 80% 90%, rgba(1,36,40,0.09) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 55% 50%, rgba(255,255,255,0.55) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Floating blobs ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
      animation: drift 18s ease-in-out infinite alternate;
    }
    .blob1 { width: 380px; height: 380px; top: -100px; left: -80px; background: #012428; animation-delay: 0s; }
    .blob2 { width: 300px; height: 300px; bottom: -60px; right: -60px; background: #014e56; animation-delay: -6s; }
    .blob3 { width: 200px; height: 200px; top: 40%; left: 60%; background: #023e46; animation-delay: -12s; }

    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }

    /* ── Main wrapper ── */
    .wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 16px 40px;
    }

    /* ── Glass card ── */
    .card {
      width: 100%;
      max-width: 480px;
      background: var(--card-bg);
      backdrop-filter: blur(28px) saturate(1.6);
      -webkit-backdrop-filter: blur(28px) saturate(1.6);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      box-shadow:
        0 8px 40px var(--glass-shadow),
        0 1px 0 rgba(255,255,255,0.9) inset,
        0 -1px 0 rgba(1,36,40,0.06) inset;
      padding: 40px 32px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      opacity: 0;
      transform: translateY(24px);
      animation: cardIn 0.9s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
    }

    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo ── */
    .logo-wrap {
      width: 130px;
      height: 130px;
      border-radius: 20px;
      background: #012428;
      border: 1.5px solid rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 22px;
      box-shadow: 0 8px 28px rgba(1,36,40,0.35), 0 1px 0 rgba(255,255,255,0.1) inset;
      flex-shrink: 0;
      overflow: hidden;
    }
    .logo-wrap img {
      width: 130px;
      height: 130px;
      object-fit: cover;
    }

    /* ── Headline ── */
    .headline {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: clamp(1.65rem, 5vw, 2rem);
      line-height: 1.18;
      text-align: center;
      letter-spacing: -0.01em;
      margin-bottom: 6px;
      color: var(--ink);
    }
    .subtitle {
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 28px;
      text-align: center;
    }

    /* ── Language grid ── */
    .lang-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
      margin-bottom: 30px;
    }
    .lang-btn {
      background: rgba(255,255,255,0.55);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 13px 8px;
      font-size: 0.88rem;
      font-family: inherit;
      color: var(--ink);
      cursor: pointer;
      transition: all 0.22s ease;
      box-shadow: 0 2px 10px rgba(1,36,40,0.06);
      letter-spacing: 0.01em;
      font-weight: 400;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .lang-btn:hover, .lang-btn:active {
      background: rgba(1,36,40,0.88);
      color: #f4f0ea;
      border-color: rgba(1,36,40,0.5);
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 6px 22px rgba(1,36,40,0.22);
    }

    /* ── Divider ── */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--ink-ghost) 30%, var(--ink-ghost) 70%, transparent);
      margin-bottom: 28px;
    }

    /* ── Action buttons ── */
    .action-amazon {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 20px;
      border-radius: 14px;
      background: var(--ink);
      color: var(--bg);
      font-family: 'Jost', sans-serif;
      font-size: 0.92rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 12px;
      box-shadow: 0 6px 28px rgba(1,36,40,0.28), 0 1px 0 rgba(255,255,255,0.08) inset;
      transition: all 0.22s ease;
    }
    .action-amazon:hover { transform: translateY(-2px); box-shadow: 0 10px 36px rgba(1,36,40,0.38); }

    .action-instagram {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px 20px;
      border-radius: 14px;
      background: transparent;
      color: var(--ink);
      font-family: 'Jost', sans-serif;
      font-size: 0.92rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 1.5px solid rgba(1,36,40,0.25);
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 0;
      transition: all 0.22s ease;
      backdrop-filter: blur(8px);
    }
    .action-whatsapp {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px 20px;
      border-radius: 14px;
      background: #25D366;
      color: #fff;
      font-family: 'Jost', sans-serif;
      font-size: 0.92rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 0;
      box-shadow: 0 4px 18px rgba(37,211,102,0.30);
      transition: all 0.22s ease;
    }
    .action-whatsapp:hover { transform: translateY(-2px); box-shadow: 0 8px 26px rgba(37,211,102,0.42); }

    .icon-svg { flex-shrink: 0; }

    /* ── Footer ── */
    .footer-text {
      margin-top: 24px;
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--ink-soft);
      text-align: center;
    }

    /* ── Thank You panel ── */
    .thankyou-panel {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      text-align: center;
      animation: fadeSlide 0.6s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .thankyou-panel.visible { display: flex; }

    .lang-screen { width: 100%; }

    .check-ring {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      background: rgba(1,36,40,0.08);
      border: 1.5px solid rgba(1,36,40,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .msg-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: clamp(1.5rem, 5vw, 1.85rem);
      line-height: 1.2;
      margin-bottom: 16px;
      color: var(--ink);
    }
    .msg-body {
      font-size: 0.88rem;
      font-weight: 300;
      line-height: 1.75;
      color: var(--ink);
      margin-bottom: 28px;
      opacity: 0.85;
    }
    .msg-body strong {
      font-weight: 500;
      font-style: italic;
    }

    .back-btn {
      background: none;
      border: none;
      font-family: 'Jost', sans-serif;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-soft);
      cursor: pointer;
      margin-top: 14px;
      padding: 8px 14px;
      border-radius: 8px;
      transition: color 0.18s;
    }
    .back-btn:hover { color: var(--ink); }

    /* ── 3D gradient offset badge ── */
    .badge-offset {
      position: absolute;
      top: -14px;
      right: 28px;
      background: linear-gradient(135deg, #012428 0%, #02636e 50%, #014e56 100%);
      color: #f4f0ea;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 20px;
      box-shadow: 3px 4px 14px rgba(1,36,40,0.30), 0 1px 0 rgba(255,255,255,0.18) inset;
      transform: rotate(-1.5deg);
    }

  </style>
</head>
